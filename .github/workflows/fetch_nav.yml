name: Fetch AMFI NAV

on:
  schedule:
    # 4 runs daily — all 7 days (IST times listed, cron runs in UTC)
    # 6:00 AM IST  = 12:30 AM UTC
    # 10:30 AM IST =  5:00 AM UTC
    # 2:10 PM IST  =  8:40 AM UTC
    # 10:00 PM IST =  4:30 PM UTC
    - cron: '30 0 * * *'
    - cron: '0 5 * * *'
    - cron: '40 8 * * *'
    - cron: '30 16 * * *'
  workflow_dispatch:  # Manual trigger anytime from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push commits back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch AMFI NAV data
        run: python scripts/fetch_nav.py

      - name: Run monthly consolidation
        run: python scripts/consolidate.py

      - name: Commit and push changes
        run: |
          git config user.name "NAV Bot"
          git config user.email "nav-bot@users.noreply.github.com"
          git add data/ metadata/
          git diff --cached --quiet || git commit -m "NAV update: $(date -u +%Y-%m-%d)"
          git push
